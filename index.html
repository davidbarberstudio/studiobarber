<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>David Barber Studio - Agendamento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            min-height: 100vh;
            padding: 16px;
        }
        
       .container {
            max-width: 480px;
            margin: 0 auto;
            background: #2a2a2a;
            border-radius: 20px;
            padding: 24px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        @media (min-width: 768px) {
           .container { max-width: 600px; padding: 32px; }
        }
        
        @media (min-width: 1024px) {
           .container { max-width: 700px; }
        }
        
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            color: #d4af37;
        }
        
       .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 24px;
            font-size: 14px;
        }
        
       .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #d4af37;
            font-weight: 600;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #444;
            border-radius: 12px;
            background: #1a1a1a;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #d4af37;
            background: #222;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            color: #1a1a1a;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 8px;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
       .msg {
            padding: 14px;
            border-radius: 12px;
            margin-top: 16px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        
       .msg.success {
            background: #1a4d2e;
            color: #4ade80;
            border: 2px solid #4ade80;
        }
        
       .msg.error {
            background: #4d1a1a;
            color: #f87171;
            border: 2px solid #f87171;
        }
        
       .whatsapp-btn {
            display: none;
            width: 100%;
            padding: 14px;
            background: #25D366;
            color: white;
            text-align: center;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 12px;
        }
        
        option:disabled {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💈 David Barber Studio</h1>
        <p class="subtitle">Agende seu horário online</p>
        
        <form id="formAgendamento">
            <div class="form-group">
                <label for="cliente">Nome completo</label>
                <input type="text" id="cliente" required placeholder="Seu nome">
            </div>
            
            <div class="form-group">
                <label for="telefone">WhatsApp</label>
                <input type="tel" id="telefone" required placeholder="47999999999">
            </div>
            
            <div class="form-group">
                <label for="barbeiro">Barbeiro</label>
                <select id="barbeiro" required>
                    <option value="David">David</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="servico">Serviço</label>
                <select id="servico" required>
                    <option value="">Selecione...</option>
                    <option value="Corte">Corte - 30min</option>
                    <option value="Barba">Barba - 30min</option>
                    <option value="Corte e Barba">Corte e Barba - 1h</option>
                    <option value="Sobrancelha">Sobrancelha - 30min</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="data">Data</label>
                <input type="date" id="data" required>
            </div>
            
            <div class="form-group">
                <label for="hora">Horário</label>
                <select id="hora" required>
                    <option value="">Selecione a data primeiro</option>
                </select>
            </div>
            
            <button type="submit" id="btnAgendar">Agendar Agora</button>
        </form>
        
        <div id="msg" class="msg"></div>
        <a id="whatsappBtn" class="whatsapp-btn" target="_blank">📱 Enviar Confirmação no WhatsApp</a>
    </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzcQMOm11ba3BRV0pRKlVplcGx0goPhtHIHurr-jm0sa0rzs9ujvdeTH4xFEyPIhMKjlQ/exec";

document.addEventListener("DOMContentLoaded", function() {
    const hoje = new Date();
    document.getElementById("data").min = hoje.toISOString().split("T")[0];
    document.getElementById("data").value = hoje.toISOString().split("T")[0];
    
    document.getElementById("data").addEventListener("change", function() {
        carregarHorariosDisponiveis(this.value);
    });
    
    document.getElementById("servico").addEventListener("change", function() {
        const data = document.getElementById("data").value;
        if (data) carregarHorariosDisponiveis(data);
    });
    
    document.getElementById("barbeiro").addEventListener("change", function() {
        const data = document.getElementById("data").value;
        if (data) carregarHorariosDisponiveis(data);
    });
    
    carregarHorariosDisponiveis(document.getElementById("data").value);
    
    document.getElementById("formAgendamento").addEventListener("submit", enviarFormulario);
});

function obtenerMatrizHorarios(diaSemana) {
    if (diaSemana === 6) {
        return ["08:00", "08:30", "09:00", "09:30", "10:00", "10:30", "11:00", "11:30"];
    }
    return ["08:00", "08:30", "09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", "17:00", "17:30", "18:00"];
}

async function carregarHorariosDisponiveis(dataSeleccionada) {
    const selectHora = document.getElementById("hora");
    const barbeiro = document.getElementById("barbeiro").value;
    const servico = document.getElementById("servico").value;
    selectHora.innerHTML = "<option value=''>Carregando...</option>";

    const partes = dataSeleccionada.split("-");
    const dateObj = new Date(partes[0], partes[1] - 1, partes[2]);
    const diaSemana = dateObj.getDay();

    if (diaSemana === 0) {
        selectHora.innerHTML = "<option value=''>Fechado aos Domingos</option>";
        return;
    }

    const horariosBase = obtenerMatrizHorarios(diaSemana);
    let ocupados = [];

    try {
        const respuesta = await fetch(API_URL + "?data=" + dataSeleccionada + "&barbeiro=" + encodeURIComponent(barbeiro));
        const texto = await respuesta.text();
        if (texto && texto.trim()!== "") {
            ocupados = JSON.parse(texto);
        }
    } catch (e) {
        selectHora.innerHTML = "<option value=''>Erro ao carregar</option>";
        return;
    }

    const bloquesOcupados = [];
    if (Array.isArray(ocupados)) {
        ocupados.forEach(function(item) {
            const hItem = (typeof item === 'object')? item.hora : item;
            const blq = (typeof item === 'object')? parseInt(item.bloques) : 1;
            if (hItem) {
                const t = hItem.toString().trim().substring(0, 5);
                const idx = horariosBase.indexOf(t);
                if (idx!== -1) {
                    for (let b = 0; b < blq; b++) {
                        if ((idx + b) < horariosBase.length) bloquesOcupados.push(horariosBase[idx + b]);
                    }
                }
            }
        });
    }

    const agora = new Date();
    const hoyStr = agora.toISOString().split("T")[0];
    const horaActualStr = String(agora.getHours()).padStart(2, '0') + ":" + String(agora.getMinutes()).padStart(2, '0');
    selectHora.innerHTML = "";

    const bloquesNecesarios = (servico === "Corte e Barba")? 2 : 1;

    for (let i = 0; i < horariosBase.length; i++) {
        const h = horariosBase[i];
        let esIndisponivel = false;

        // Verificar si hay espacio para todos los bloques necesarios
        for (let b = 0; b < bloquesNecesarios; b++) {
            if ((i + b) >= horariosBase.length || bloquesOcupados.includes(horariosBase[i + b])) {
                esIndisponivel = true;
                break;
            }
        }

        const pasoHora = (dataSeleccionada === hoyStr && h <= horaActualStr);
        const estaOcupado = bloquesOcupados.includes(h);

        const opt = document.createElement("option");
        opt.value = h;
        opt.text = h;

        if (pasoHora) {
            opt.disabled = true;
            opt.text = h + " (Já passou)";
        } else if (estaOcupado) {
            opt.disabled = true;
            opt.text = h + " (Ocupado)";
        } else if (esIndisponivel) {
            opt.disabled = true;
            opt.text = h + " (Indisponível)";
        }
        selectHora.add(opt);
    }

    if (selectHora.options.length === 0) {
        selectHora.innerHTML = "<option value='' disabled>Sem horários</option>";
    } else {
        const optSel = document.createElement("option");
        optSel.text = "Selecione o horário...";
        optSel.disabled = true;
        optSel.selected = true;
        selectHora.insertBefore(optSel, selectHora.firstChild);
    }
}

async function enviarFormulario(e) {
    e.preventDefault();
    const btn = document.getElementById("btnAgendar");
    const msg = document.getElementById("msg");
    const whatsappBtn = document.getElementById("whatsappBtn");
    
    btn.disabled = true;
    btn.textContent = "Agendando...";
    msg.style.display = "none";
    whatsappBtn.style.display = "none";

    const datos = {
        cliente: document.getElementById("cliente").value,
        telefone: document.getElementById("telefone").value,
        servico: document.getElementById("servico").value,
        barbeiro: document.getElementById("barbeiro").value,
        data: document.getElementById("data").value,
        hora: document.getElementById("hora").value
    };

    try {
        const respuesta = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams(datos)
        });
        const resultado = await respuesta.json();

        msg.textContent = resultado.message;
        msg.className = resultado.success? "msg success" : "msg error";
        msg.style.display = "block";

        if (resultado.success && resultado.whatsapp) {
            whatsappBtn.href = resultado.whatsapp;
            whatsappBtn.style.display = "block";
            document.getElementById("formAgendamento").reset();
            carregarHorariosDisponiveis(datos.data);
        }
    } catch (error) {
        msg.textContent = "❌ Erro de conexão. Tente novamente.";
        msg.className = "msg error";
        msg.style.display = "block";
    }

    btn.disabled = false;
    btn.textContent = "Agendar Agora";
}
</script>
</body>
</html>
