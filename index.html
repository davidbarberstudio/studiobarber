<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Barbero Studio</title>

<style>
/* RESET DE PANTALLA MODERNO CLÁSICO */
body, html {
  margin: 0;
  padding: 0;
  background: #000;
  font-family: Arial, sans-serif;
  color: #ddd;
  text-align: center;
}

/* PANTALLA DE CARGA INICIAL */
#loader {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: #000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 99999;
}
.loader-title {
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #D4AF37, #fff, #D4AF37);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.loader-bar {
  width: 180px; height: 4px;
  background: #222;
  margin-top: 20px;
  border-radius: 10px;
  overflow: hidden;
}
.loader-bar span {
  display: block; height: 100%; width: 0%;
  background: #D4AF37;
  animation: loading 1.5s forwards;
}
@keyframes loading {
  100% { width: 100%; }
}

/* ESTILOS DE LUXURY BRANDING */
.titulo {
  font-size: 30px;
  font-weight: bold;
  letter-spacing: 2px;
  margin: 25px 0 5px 0;
  background: linear-gradient(90deg, #D4AF37, #fff, #D4AF37);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.slogan {
  font-size: 13px;
  color: #fff;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 15px;
}
.horarios-info {
  font-size: 13px;
  color: #D4AF37;
  line-height: 1.6;
  margin-bottom: 25px;
}

/* CONTENEDOR DEL FORMULARIO */
#form-container {
  position: relative;
  max-width: 400px;
  margin: auto;
  padding: 20px;
  border-radius: 15px;
  background: #0d0d0d;
  border: 1px solid #222;
  box-shadow: 0 0 20px rgba(212,175,55,0.1);
  box-sizing: border-box;
}

/* CARDS DE PROFESIONALES */
.barbeiros-container {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 10px 0 20px 0;
}
.card-barbeiro {
  background: #000;
  border-radius: 12px;
  padding: 12px;
  width: 110px;
  cursor: pointer;
  transition: 0.3s;
  border: 2px solid #222;
}
.card-barbeiro img {
  width: 65px; height: 65px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid #333;
}
.card-barbeiro span {
  display: block;
  margin-top: 7px;
  font-size: 14px;
  font-weight: bold;
}
.card-barbeiro.active {
  border-color: #D4AF37;
  box-shadow: 0 0 10px rgba(212,175,55,0.3);
}

/* INPUTS Y SELECTOR */
label {
  display: block;
  text-align: left;
  margin: 14px 0 6px 15px;
  font-size: 13px;
  font-weight: bold;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: 1px;
}
select, input {
  width: 92%;
  padding: 12px;
  margin-bottom: 5px;
  border-radius: 8px;
  border: 1px solid #222;
  background: #000;
  color: #fff;
  font-size: 16px;
  box-sizing: border-box;
}
select:focus, input:focus {
  outline: none;
  border-color: #D4AF37;
}

option:disabled {
  color: #555;
  background: #111;
}

button {
  background: linear-gradient(90deg, #D4AF37, #F3E5AB);
  color: #000;
  border: none;
  padding: 14px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
  width: 92%;
  transition: 0.2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
button:hover {
  transform: scale(1.02);
}

#confirmacao {
  display: none;
  margin-top: 15px;
  color: #00ff7f;
  font-weight: bold;
  background: #001a0d;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #00ff7f;
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-title">DAVID BARBERO STUDIO</div>
  <div class="loader-bar"><span></span></div>
</div>

<div class="titulo">DAVID BARBERO STUDIO</div>
<div class="slogan">Estilo, Precisão e Confiança</div>
<div class="horarios-info">
  🕒 Segunda: 08:30–11:00 | 13:00–17:30<br>
  🕒 Terça a Sexta: 08:30–11:00 | 13:00–18:00<br>
  🕒 Sábado: 08:00–11:30 | 13:00–17:30
</div>

<div id="form-container">
  <form id="agendaForm">
    
    <label>💈 Escolha o Profissional</label>
    <div class="barbeiros-container">
      <div class="card-barbeiro active" onclick="seleccionarBarber('David', this)">
        <img src="https://via.placeholder.com/150/000000/D4AF37?text=D">
        <span>David</span>
      </div>
    </div>
    <input type="hidden" id="barbeiro" value="David">

    <label>✂️ Selecione o Serviço</label>
    <select id="servico" onchange="triggerCargaHoras()">
      <option value="Corte">Corte Masculino — R$40</option>
      <option value="Barba">Barba / Barbaterapia — R$30</option>
      <option value="Corte e Barba">Corte & Barba — R$70</option>
      <option value="Sobrancelha">Sobrancelha — R$15</option>
    </select>

    <label>📅 Data do Agendamento</label>
    <input type="date" id="data" required onchange="triggerCargaHoras()">

    <label>👤 Seu Nome</label>
    <input type="text" id="nome" placeholder="Digite seu nome completo" required>

    <label>📱 Seu WhatsApp</label>
    <input type="tel" inputmode="numeric" id="telefone" placeholder="Ex: 47999999999" required>

    <label>⏰ Horários Disponíveis</label>
    <select id="hora" required>
      <option value="">Selecione a data primeiro...</option>
    </select>
    
    <button type="button" id="btnAgendar" onclick="solicitarAgendamento()">Agendar Horário ✅</button>
  </form>

  <div id="confirmacao">
    Agendamento enviado com sucesso! Redirecionando para o WhatsApp...
  </div>
</div>

<script>
(function(){
  "use strict";

  const API_URL = "https://script.google.com/macros/s/AKfycbzcQMOm11ba3BRV0pRKlVplcGx0goPhtHIHurr-jm0sa0rzs9ujvdeTH4xFEyPIhMKjlQ/exec";

  window.addEventListener("load", function(){
    setTimeout(function(){
      document.getElementById("loader").style.display = "none";
    }, 1000);
    
    var hoje = new Date();
    var mes = String(hoje.getMonth() + 1).padStart(2, '0');
    var dia = String(hoje.getDate()).padStart(2, '0');
    document.getElementById("data").min = hoje.getFullYear() + "-" + mes + "-" + dia;
  });

  window.seleccionarBarber = function(nome, elemento) {
    document.getElementById("barbeiro").value = nome;
    var cards = document.querySelectorAll(".card-barbeiro");
    cards.forEach(c => c.classList.remove("active"));
    elemento.classList.add("active");
    triggerCargaHoras();
  };

  window.triggerCargaHoras = function() {
    var dataVal = document.getElementById("data").value;
    if (dataVal) {
      carregarHorariosDisponiveis(dataVal);
    }
  };

  function obtenerMatrizHorarios(diaSemana) {
    if (diaSemana === 0) return [];
    if (diaSemana === 1) {
      return ["08:30","09:00","09:30","10:00","10:30","11:00","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30"];
    }
    if (diaSemana === 6) {
      return ["08:00","08:30","09:00","09:30","10:00","10:30","11:00","11:30","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30"];
    }
    return ["08:30","09:00","09:30","10:00","10:30","11:00","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00"];
  }

  async function carregarHorariosDisponiveis(dataSeleccionada) {
    var selectHora = document.getElementById("hora");
    var barbeiro = document.getElementById("barbeiro").value;
    var servico = document.getElementById("servico").value;

    selectHora.innerHTML = "<option value=''>Carregando horários...</option>";

    var partes = dataSeleccionada.split("-");
    var dateObj = new Date(partes[0], partes[1] - 1, partes[2]);
    var diaSemana = dateObj.getDay();

    if (diaSemana === 0) {
      selectHora.innerHTML = "<option value=''>Fechado aos Domingos</option>";
      return;
    }

    var horariosBase = obtenerMatrizHorarios(diaSemana);
    var ocupados = [];

    try {
      var respuesta = await fetch(API_URL + "?reservas=1&data=" + dataSeleccionada + "&barbero=" + encodeURIComponent(barbeiro));
      ocupados = await respuesta.json();
    } catch (e) {
      console.log("Error cargando horas.", e);
    }

    var agora = new Date();
    var hoyStr = agora.getFullYear() + "-" + String(agora.getMonth() + 1).padStart(2, '0') + "-" + String(agora.getDate()).padStart(2, '0');
    var horaActualStr = String(agora.getHours()).padStart(2, '0') + ":" + String(agora.getMinutes()).padStart(2, '0');

    selectHora.innerHTML = "";
    var opcionesValidas = 0;

    for (var i = 0; i < horariosBase.length; i++) {
      var h = horariosBase[i];
      var opt = document.createElement("option");
      opt.value = h;
      opt.text = h;

      var estaOcupado = (ocupados.indexOf(h) !== -1);
      var pasoHora = (dataSeleccionada === hoyStr && h <= horaActualStr);

      if (servico === "Corte e Barba" && !estaOcupado && !pasoHora) {
        if (i + 1 < horariosBase.length) {
          var siguienteHora = horariosBase[i + 1];
          if (ocupados.indexOf(siguienteHora) !== -1) {
            estaOcupado = true;
          }
        } else {
          estaOcupado = true;
        }
      }

      if (estaOcupado) {
        opt.disabled = true;
        opt.text = h + " (Ocupado)";
      } else if (pasoHora) {
        opt.disabled = true;
        opt.text = h + " (Já passou)";
      } else {
        opcionesValidas++;
      }

      selectHora.add(opt);
    }

    if (opcionesValidas === 0) {
      selectHora.innerHTML = "<option value=''>Sem horários para este serviço</option>";
    }
  }

  window.solicitarAgendamento = function() {
    var btn = document.getElementById("btnAgendar");
    var data = document.getElementById("data").value;
    var hora = document.getElementById("hora").value;
    var nome = document.getElementById("nome").value.trim();
    var telefone = document.getElementById("telefone").value.trim();
    var barbeiro = document.getElementById("barbeiro").value;
    var servico = document.getElementById("servico").value;

    if (!data || !hora || !nome || !telefone) {
      alert("Por favor, preencha todos os campos obrigatórios.");
      return;
    }

    btn.disabled = true;
    btn.innerText = "Processando... ⌛";

    // TRUCO DE ULTRA VELOCIDAD: Lanzamos el guardado en Sheets en segundo plano
    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({
        data: data,
        hora: hora,
        cliente: nome,
        telefone: telefone,
        servico: servico,
        barbeiro: barbeiro
      })
    }).catch(err => console.log("Guardado diferido en proceso..."));

    // Redirección INMEDIATA a WhatsApp sin esperar a Google Sheets
    document.getElementById("confirmacao").style.display = "block";
    
    var textoWhatsApp = "Olá David Barbero Studio!%0A%0A" +
                        "Gostaria de confirmar meu agendamento:%0A" +
                        "💈 Barbeiro: " + barbeiro + "%0A" +
                        "✂️ Serviço: " + servico + "%0A" +
                        "📅 Data: " + data + "%0A" +
                        "⏰ Hora: " + hora + "%0A" +
                        "👤 Nome: " + nome;
    
    window.open("https://wa.me/5595991554792?text=" + textoWhatsApp, "_blank");
    
    document.getElementById("nome").value = "";
    document.getElementById("telefone").value = "";
    document.getElementById("hora").selectedIndex = 0;
    
    setTimeout(function(){
      document.getElementById("confirmacao").style.display = "none";
      triggerCargaHoras();
      btn.disabled = false;
      btn.innerText = "Agendar Horário ✅";
    }, 2000);
  };

})();
</script>
</body>
</html>
