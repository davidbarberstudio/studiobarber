<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento - David Barber Studio</title>
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-color: #ffffff;
      --accent-color: #d4af37; /* Dourado */
      --accent-hover: #aa8c2c;
      --danger-color: #cf6679;
      --border-color: #333333;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: var(--card-bg);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      border: 1px solid var(--accent-color);
      width: 100%;
      max-width: 500px;
    }

    h2 {
      text-align: center;
      color: var(--accent-color);
      margin-bottom: 25px;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #bbbbbb;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      background-color: #2a2a2a;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      transition: border-color 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    /* Contêiner de Horários Grid */
    .horarios-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      gap: 10px;
      margin-top: 8px;
      max-height: 200px;
      overflow-y: auto;
      padding: 5px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background-color: #1a1a1a;
    }

    .hora-btn {
      padding: 10px 0;
      background-color: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      text-align: center;
      transition: all 0.2s;
    }

    .hora-btn:hover:not(:disabled) {
      background-color: var(--accent-color);
      color: #000;
      border-color: var(--accent-color);
    }

    .hora-btn.selected {
      background-color: var(--accent-color) !important;
      color: #000 !important;
      border-color: var(--accent-color) !important;
      font-weight: bold;
    }

    .hora-btn:disabled {
      background-color: #151515;
      border-color: #222;
      color: #555;
      text-decoration: line-through;
      cursor: not-allowed;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background-color: var(--accent-color);
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      transition: background-color 0.3s;
    }

    .btn-submit:hover:not(:disabled) {
      background-color: var(--accent-hover);
    }

    .btn-submit:disabled {
      background-color: #555;
      color: #aaa;
      cursor: not-allowed;
    }

    #confirmacao {
      display: none;
      text-align: center;
      margin-top: 15px;
      color: var(--accent-color);
      font-weight: 500;
      font-size: 14px;
    }

    .loading-text {
      text-align: center;
      grid-column: 1 / -1;
      color: #aaa;
      padding: 15px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>DAVID BARBER STUDIO</h2>
  
  <div class="form-group">
    <label for="barbeiro">Selecione o Barbeiro:</label>
    <select id="barbeiro" onchange="buscarHorariosOcupados()">
      <option value="David">David</option>
      <option value="Armando">Armando</option>
    </select>
  </div>

  <div class="form-group">
    <label for="servico">Selecione o Serviço:</label>
    <select id="servico" onchange="buscarHorariosOcupados()">
      <option value="Corte">Corte - R$ 40 (30 min)</option>
      <option value="Barba">Barba - R$ 30 (30 min)</option>
      <option value="Sobrancelha">Sobrancelha - R$ 10 (30 min)</option>
      <option value="Corte e Barba">Corte e Barba - R$ 70 (1h 00 min)</option>
    </select>
  </div>

  <div class="form-group">
    <label for="data">Selecione a Data:</label>
    <input type="date" id="data" onchange="buscarHorariosOcupados()">
  </div>

  <div class="form-group">
    <label>Horários Disponíveis:</label>
    <input type="hidden" id="hora" value="">
    <div class="horarios-container" id="gridHorarios">
      <div class="loading-text">Selecione uma data para ver os horários...</div>
    </div>
  </div>

  <div class="form-group">
    <label for="nome">Nome do Cliente:</label>
    <input type="text" id="nome" placeholder="Digite seu nome completo">
  </div>

  <div class="form-group">
    <label for="telefone">Telefone / WhatsApp:</label>
    <input type="tel" id="telefone" placeholder="Ex: 95991554792">
  </div>

  <button class="btn-submit" id="btnAgendar" onclick="solicitarAgendamento()">Agendar Horário ✅</button>
  <div id="confirmacao">Processando agendamento em segundo plano... ⌛</div>
</div>

<script>
  // URL INTEGRADA DE TU WEB APP DE GOOGLE APPS SCRIPT
  const API_URL = "https://script.google.com/macros/s/AKfycbzcQMOm11ba3BRV0pRKlVplcGx0goPhtHIHurr-jm0sa0rzs9ujvdeTH4xFEyPIhMKjlQ/exec";

  // Lista base de todos os horários de trabalho da barbearia
  const HORARIOS_BASE = [
    "08:00", "08:30", "09:00", "09:30", "10:00", "10:30", "11:00", "11:30",
    "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30",
    "17:00", "17:30", "18:00", "18:30", "19:00", "19:30"
  ];

  // Estabelecer a data de hoje por defeito ao carregar a página
  window.addEventListener('DOMContentLoaded', () => {
    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('data').value = hoy;
    buscarHorariosOcupados();
  });

  // FUNÇÃO 1: BUSCA OS HORÁRIOS OCUPADOS E OS BLOQUEIA DINAMICAMENTE
  function buscarHorariosOcupados() {
    const data = document.getElementById("data").value;
    const barbeiro = document.getElementById("barbeiro").value;
    const servico = document.getElementById("servico").value;
    const grid = document.getElementById("gridHorarios");
    
    if (!data) return;

    grid.innerHTML = '<div class="loading-text">Buscando horários disponíveis... ⌛</div>';
    document.getElementById("hora").value = ""; // Reseta seleção

    // Chamada limpa ao doGet do Script usando o parâmetro "barbeiro" correto
    fetch(`${API_URL}?data=${data}&barbeiro=${barbeiro}`)
      .then(res => res.json())
      .then(ocupados => {
        grid.innerHTML = "";
        
        // Criamos um set com as horas que devem bloquear-se por completo
        const horasBloqueadas = new Set();

        ocupados.forEach(reserva => {
          let indiceHora = HORARIOS_BASE.indexOf(reserva.hora);
          if (indiceHora !== -1) {
            // Bloqueia o horário de início e todos os blocos consecutivos que dure o serviço
            for (let b = 0; b < reserva.bloques; b++) {
              if (indiceHora + b < HORARIOS_BASE.length) {
                horasBloqueadas.add(HORARIOS_BASE[indiceHora + b]);
              }
            }
          }
        });

        // Determinar quantos blocos necessita o serviço ATUAL que o cliente quer agendar
        const bloquesNecesariosHoy = (servico === "Corte e Barba") ? 2 : 1;

        // Renderizar os botões na tela
        HORARIOS_BASE.forEach((hora, index) => {
          const btn = document.createElement("button");
          btn.className = "hora-btn";
          btn.innerText = hora;
          btn.type = "button";

          // Regra de Validação de Bloqueios:
          let estaBloqueado = false;
          
          // Validar se a hora em si já está ocupada ou se compromete o bloco seguinte para serviços longos
          for (let b = 0; b < bloquesNecesariosHoy; b++) {
            if (index + b >= HORARIOS_BASE.length || horasBloqueadas.has(HORARIOS_BASE[index + b])) {
              estaBloqueado = true;
              break;
            }
          }

          if (estaBloqueado) {
            btn.disabled = true;
          } else {
            btn.onclick = () => seleccionarHora(btn, hora);
          }

          grid.appendChild(btn);
        });

        if (grid.innerHTML === "") {
          grid.innerHTML = '<div class="loading-text">Nenhum horário disponível.</div>';
        }
      })
      .catch(err => {
        console.error(err);
        grid.innerHTML = '<div class="loading-text" style="color:red;">Erro ao carregar horários.</div>';
      });
  }

  function seleccionarHora(btn, hora) {
    // Tirar seleção dos outros botões
    document.querySelectorAll('.hora-btn').forEach(b => b.classList.remove('selected'));
    // Selecionar o atual
    btn.classList.add('selected');
    document.getElementById("hora").value = hora;
  }

  // FUNÇÃO 2: SALVA PRIMEIRO DE FORMA VELOZ E EM SEGUNDO PLANO ABRE O WHATSAPP
  function solicitarAgendamento() {
    const btn = document.getElementById("btnAgendar");
    const confirmacion = document.getElementById("confirmacao");
    
    const data = document.getElementById("data").value;
    const hora = document.getElementById("hora").value;
    const nome = document.getElementById("nome").value.trim();
    const telefone = document.getElementById("telefone").value.trim();
    const barbeiro = document.getElementById("barbeiro").value;
    const servico = document.getElementById("servico").value;

    if (!data || !hora || !nome || !telefone) {
      alert("Por favor, preencha todos os campos (Não esqueça de selecionar o horário).");
      return;
    }

    // Bloqueio visual instantâneo para evitar duplo envio
    btn.disabled = true;
    btn.innerText = "Salvando Agendamento... ⚡";
    confirmacion.style.display = "block";

    // ENVIO ULTRA RÁPIDO VIA POST PARA O GOOGLE SHEETS
    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({
        data: data,
        hora: hora,
        cliente: nome,
        telefone: telefone,
        servico: servico,
        barbeiro: barbeiro
      })
    })
    .then(res => res.json())
    .then(result => {
      if (result.status === "success") {
        
        // UMA VEZ CONFIRMADO O SALVAMENTO COM SUCESSO, ABRIMOS O WHATSAPP IMEDIATAMENTE
        const textoWhatsApp = `Olá ${barbeiro}!%0A%0A` +
                            `Gostaria de confirmar meu agendamento no David Barber Studio:%0A%0A` +
                            `✂️ *Serviço:* ${servico}%0A` +
                            `📅 *Data:* ${data}%0A` +
                            `⏰ *Hora:* ${hora}%0A` +
                            `👤 *Nome:* ${nome}%0A` +
                            `🆔 *ID Cliente:* ${result.id}`;
        
        // Abre o WhatsApp numa aba limpa sem travar o navegador
        window.open(`https://wa.me/5595991554792?text=${textoWhatsApp}`, "_blank");

        // LIMPEZA DO FORMULÁRIO E ATUALIZAÇÃO AUTOMÁTICA DOS BLOQUEIOS
        document.getElementById("nome").value = "";
        document.getElementById("telefone").value = "";
        buscarHorariosOcupados(); // Bloqueia o horário recém-agendado instantaneamente

        alert("Agendamento realizado com sucesso! Redirecionando para o WhatsApp...");
      } else {
        alert("Erro ao salvar. Tente novamente.");
      }
    })
    .catch(err => {
      console.error(err);
      alert("Erro de conexão ao salvar agendamento.");
    })
    .finally(() => {
      // Restauramos o botão ao seu estado original
      btn.disabled = false;
      btn.innerText = "Agendar Horário ✅";
      confirmacion.style.display = "none";
    });
  }
</script>

</body>
</html>
