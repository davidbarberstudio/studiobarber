<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>David Barber Studio</title>

<style>
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background-color: #000000; font-family: 'Times New Roman', Georgia, serif; color: #f5f5f5;
  overflow-x: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box;
}

/* Loader */
#loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; }
.loader-title { font-size: 24px; font-weight: bold; letter-spacing: 4px; background: linear-gradient(90deg, #b39210, #f8e48d, #b39210); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.loader-bar { width: 150px; height: 2px; background: #1a1a1a; margin-top: 15px; border-radius: 10px; overflow: hidden; }
.loader-bar span { display: block; height: 100%; width: 0%; background: #D4AF37; animation: loading 1s forwards; }
@keyframes loading { 100% { width: 100%; } }

.header-container { margin-bottom: 15px; text-align: center; padding: 0 10px; }
.titulo { font-size: 28px; font-weight: bold; letter-spacing: 2px; background: linear-gradient(135deg, #c5a059 0%, #fdf0cd 50%, #c5a059 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.slogan { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; color: #ffffff; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; opacity: 0.9; }

#form-container { width: 92%; max-width: 390px; padding: 20px; border-radius: 8px; background: #070707; border: 1px solid #2c2514; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); box-sizing: border-box; }

.barbeiros-container { display: flex; justify-content: center; gap: 10px; margin: 5px 0 15px 0; }
.card-barbeiro { background: #000; border-radius: 4px; padding: 10px; width: 100px; cursor: pointer; border: 1px solid #222; text-align: center; }
.card-barbeiro.active { border-color: #fdf0cd; background: #0f0e0b; }
.card-barbeiro img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid #c5a059; }
.card-barbeiro span { display: block; margin-top: 6px; font-size: 13px; font-weight: bold; color: #ddd; }

/* Para esconder el 2do barbero temporalmente */
.hidden-barber { display: none; }

label { display: block; text-align: left; margin: 10px 0 5px 2px; font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: 600; color: #8a8a8a; text-transform: uppercase; letter-spacing: 1.5px; }
select, input { width: 100%; padding: 12px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #2a2a2a; background: #000000; color: #ffffff; font-size: 14px; box-sizing: border-box; }
button { background: linear-gradient(135deg, #967433 0%, #c5a059 50%, #fdf0cd 100%); color: #000000; border: none; padding: 14px; font-size: 13px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 20px; width: 100%; text-transform: uppercase; letter-spacing: 2px; }
#confirmacao { display: none; margin-top: 15px; color: #fdf0cd; font-size: 13px; font-family: 'Segoe UI', Arial, sans-serif; background: #110f0a; padding: 12px; border-radius: 4px; border: 1px solid #c5a059; text-align: center; }
</style>
</head>
<body>

<div id="loader"><div class="loader-title">DAVID BARBER STUDIO</div><div class="loader-bar"><span></span></div></div>

<div class="header-container">
  <div class="titulo">DAVID BARBER STUDIO</div>
  <div class="slogan">Estilo, Precisão e Confiança</div>
</div>

<div id="form-container">
  <form id="agendaForm">
    <label>💈 Profissional</label>
    <div class="barbeiros-container">
      <div class="card-barbeiro active" onclick="seleccionarBarber('David', this)">
        <img src="https://images.unsplash.com/photo-1517832606589-7a598b647192?w=150&auto=format&fit=crop&q=60">
        <span>David</span>
      </div>
      <!-- Solo quita la clase hidden-barber cuando contrates al 2do -->
      <div class="card-barbeiro hidden-barber" onclick="seleccionarBarber('Barbeiro 2', this)">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150&auto=format&fit=crop&q=60">
        <span>Barbeiro 2</span>
      </div>
    </div>
    <input type="hidden" id="barbeiro" value="David">

    <label>✂️ Serviço</label>
    <select id="servico" onchange="triggerCargaHoras()">
      <option value="Corte">Corte Masculino — R$40</option>
      <option value="Barba">Barba — R$30</option>
      <option value="Corte e Barba">Corte & Barba — R$70</option>
      <option value="Sobrancelha">Sobrancelha — R$10</option>
    </select>

    <label>📅 Data</label>
    <input type="date" id="data" required onchange="triggerCargaHoras()">
    <label>👤 Nome</label>
    <input type="text" id="nome" placeholder="Seu nome" required>
    <label>📱 WhatsApp</label>
    <input type="tel" id="telefone" placeholder="Seu número" required>
    <label>⏰ Horários</label>
    <select id="hora" required></select>
    <button type="button" id="btnAgendar" onclick="solicitarAgendamento()">Agendar Horário ✅</button>
  </form>
  <div id="confirmacao">Enviando...</div>
</div>

<script>
(function(){
  "use strict";
  const API_URL = "https://script.google.com/macros/s/AKfycbzcQMOm11ba3BRV0pRKlVplcGx0goPhtHIHurr-jm0sa0rzs9ujvdeTH4xFEyPIhMKjlQ/exec";

  window.seleccionarBarber = function(nome, el) {
    document.getElementById("barbeiro").value = nome;
    document.querySelectorAll(".card-barbeiro").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
    triggerCargaHoras();
  };

  window.triggerCargaHoras = function() {
    var d = document.getElementById("data").value;
    if(d) carregarHorariosDisponiveis(d);
  };

  async function carregarHorariosDisponiveis(dataSeleccionada) {
    var selectHora = document.getElementById("hora");
    var servico = document.getElementById("servico").value;
    var barbeiro = document.getElementById("barbeiro").value;
    
    var horariosBase = ["08:30","09:00","09:30","10:00","10:30","11:00","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00"];
    var ocupados = [];
    
    try {
      var res = await fetch(API_URL + "?reservas=1&data=" + dataSeleccionada + "&barbero=" + encodeURIComponent(barbeiro));
      ocupados = await res.json();
    } catch(e){}

    selectHora.innerHTML = "";
    
    for (var i = 0; i < horariosBase.length; i++) {
      var h = horariosBase[i];
      var estaOcupado = ocupados.includes(h);
      
      // Lógica estricta: si es Corte e Barba, bloquea si la actual O la siguiente está ocupada
      if (servico === "Corte e Barba") {
        if (estaOcupado || (i + 1 < horariosBase.length && ocupados.includes(horariosBase[i+1]))) {
            continue; // Saltamos este horario, no lo agregamos al select
        }
      } else {
        if (estaOcupado) continue;
      }

      var opt = document.createElement("option");
      opt.value = h;
      opt.text = h;
      selectHora.add(opt);
    }
    
    if(selectHora.options.length === 0) selectHora.innerHTML = "<option>Sem horários</option>";
  }

  window.solicitarAgendamento = function() {
    var d = document.getElementById("data").value;
    var h = document.getElementById("hora").value;
    var n = document.getElementById("nome").value;
    var t = document.getElementById("telefone").value;
    var b = document.getElementById("barbeiro").value;
    var s = document.getElementById("servico").value;

    if(!d || !h || !n || !t) return alert("Preencha tudo!");
    
    var msg = "Olá " + b + ", quero agendar no David Barber Studio:%0A" + s + "%0AData: " + d + "%0AHora: " + h + "%0ANome: " + n;
    window.open("https://wa.me/5595991554792?text=" + msg, "_blank");
    
    fetch(API_URL, { method: "POST", body: new URLSearchParams({data:d, hora:h, cliente:n, telefone:t, servico:s, barbero:b}) })
    .then(() => alert("Agendado!"));
  };
})();
</script>
</body>
</html>
