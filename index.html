<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>David Barber Studio</title>

<style>
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background-color: #000000; font-family: 'Segoe UI', Arial, sans-serif; color: #f5f5f5;
  display: flex; flex-direction: column; justify-content: flex-start; align-items: center; box-sizing: border-box;
}

#loader {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000000;
  display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999;
}
.loader-title {
  font-family: 'Times New Roman', Georgia, serif; font-size: 24px; font-weight: bold; letter-spacing: 4px;
  background: linear-gradient(90deg, #b39210, #f8e48d, #b39210); background-size: 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.loader-bar { width: 150px; height: 2px; background: #1a1a1a; margin-top: 15px; border-radius: 10px; overflow: hidden; }
.loader-bar span { display: block; height: 100%; width: 0%; background: #D4AF37; animation: loading 0.6s forwards; }
@keyframes loading { 100% { width: 100%; } }

#form-container {
  width: 92%; max-width: 400px; padding: 25px 20px; border-radius: 12px; margin: 20px 0;
  background: #070707; border: 1px solid #c5a059; 
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), 0 0 15px rgba(197, 160, 89, 0.15); box-sizing: border-box;
  text-align: center;
}

.logo-placeholder {
  font-family: 'Times New Roman', Georgia, serif; font-size: 50px; font-weight: bold; line-height: 1; margin-bottom: 5px;
  background: linear-gradient(135deg, #c5a059 0%, #fdf0cd 50%, #c5a059 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.titulo {
  font-family: 'Times New Roman', Georgia, serif; font-size: 22px; font-weight: bold; letter-spacing: 3px; margin: 0 0 6px 0;
  background: linear-gradient(135deg, #c5a059 0%, #fdf0cd 50%, #c5a059 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.slogan { font-size: 10px; color: #ffffff; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.9; }
.horarios-info { font-size: 10px; color: #c5a059; line-height: 1.5; opacity: 0.85; margin-bottom: 15px; border-bottom: 1px dashed #2c2514; padding-bottom: 15px; }

.barbeiros-container { display: flex; justify-content: center; gap: 12px; margin: 5px 0 15px 0; }
.card-barbeiro { background: #000000; border-radius: 8px; padding: 12px; width: 110px; cursor: pointer; transition: 0.3s; border: 1px solid #222222; text-align: center; }
.card-barbeiro img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #c5a059; }
.card-barbeiro span { display: block; margin-top: 8px; font-size: 13px; font-weight: bold; letter-spacing: 1px; color: #dddddd; }
.card-barbeiro.active { border-color: #fdf0cd; background: #0f0e0b; box-shadow: 0 0 12px rgba(197, 160, 89, 0.3); }

label { display: block; text-align: left; margin: 14px 0 6px 2px; font-size: 10px; font-weight: 700; color: #8a8a8a; text-transform: uppercase; letter-spacing: 1.5px; }
select, input { width: 100%; padding: 14px; margin-bottom: 5px; border-radius: 6px; border: 1px solid #2a2a2a; background: #000000; color: #ffffff; font-size: 14px; box-sizing: border-box; }
select:focus, input:focus { outline: none; border-color: #c5a059; box-shadow: 0 0 8px rgba(197, 160, 89, 0.25); }

button { 
  background: linear-gradient(135deg, #967433 0%, #c5a059 50%, #fdf0cd 100%); 
  color: #000000; border: none; padding: 16px; font-size: 13px; font-weight: bold; 
  border-radius: 6px; cursor: pointer; margin-top: 25px; width: 100%; text-transform: uppercase; letter-spacing: 2px;
}
button:disabled { background: #222222; color: #555555; cursor: not-allowed; }
#confirmacao { display: none; margin-top: 15px; color: #fdf0cd; font-size: 13px; background: #110f0a; padding: 14px; border-radius: 6px; border: 1px solid #c5a059; text-align: center; }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-title">DAVID BARBER STUDIO</div>
  <div class="loader-bar"><span></span></div>
</div>

<div id="form-container">
  <div class="logo-placeholder">DB</div>
  <div class="titulo">DAVID BARBER STUDIO</div>
  <div class="slogan">Estilo, Precisão e Confiança</div>
  <div class="horarios-info">
    🕒 Seg: 08:30–11:00, 13:00–17:30<br>
    🕒 Ter a Sex: 08:30–11:00, 13:00–18:00<br>
    🕒 Sáb: 08:00–11:30, 13:00–17:30
  </div>

  <form id="agendaForm">
    <label>💈 Profissional</label>
    <div class="barbeiros-container">
      <div class="card-barbeiro active" onclick="seleccionarBarber('David', this)">
        <img src="https://images.unsplash.com/photo-1517832606589-7a598b647192?w=150">
        <span>David</span>
      </div>
    </div>
    <input type="hidden" id="barbeiro" value="David">

    <label>✂️ Serviço</label>
    <select id="servico" onchange="triggerCargaHoras()">
      <option value="Corte">Corte Masculino — R$40</option>
      <option value="Barba">Barba — R$30</option>
      <option value="Corte e Barba">Corte e Barba — R$70</option>
      <option value="Sobrancelha">Sobrancelha — R$10</option>
    </select>

    <label>📅 Data do Agendamento</label>
    <input type="date" id="data" required onchange="triggerCargaHoras()">

    <label>👤 Seu Nome</label>
    <input type="text" id="nome" placeholder="Digite seu nome" required>

    <label>📱 Seu WhatsApp</label>
    <input type="tel" inputmode="numeric" id="telefone" placeholder="Ex: 47999999999" required>

    <label>⏰ Horários Disponíveis</label>
    <select id="hora" required>
      <option value="">Selecione a data primeiro...</option>
    </select>
    
    <button type="button" id="btnAgendar" onclick="solicitarAgendamento()">Agendar Horário ✅</button>
  </form>

  <div id="confirmacao">Enviando agendamento... por favor, aguarde.</div>
</div>

<script>
(function(){
  "use strict";

  const API_URL = "https://script.google.com/macros/s/AKfycbzcQMOm11ba3BRV0pRKlVplcGx0goPhtHIHurr-jm0sa0rzs9ujvdeTH4xFEyPIhMKjlQ/exec";

  window.addEventListener("load", function(){
    setTimeout(function(){
      document.getElementById("loader").style.display = "none";
    }, 600);
    
    var hoje = new Date();
    var mes = String(hoje.getMonth() + 1).padStart(2, '0');
    var dia = String(hoje.getDate()).padStart(2, '0');
    document.getElementById("data").min = hoje.getFullYear() + "-" + mes + "-" + dia;
  });

  window.seleccionarBarber = function(nome, elemento) {
    document.getElementById("barbeiro").value = nome;
    triggerCargaHoras();
  };

  window.triggerCargaHoras = function() {
    var dataVal = document.getElementById("data").value;
    if (dataVal) carregarHorariosDisponiveis(dataVal);
  };

  function obtenerMatrizHorarios(diaSemana) {
    if (diaSemana === 0) return [];
    if (diaSemana === 1) return ["08:30","09:00","09:30","10:00","10:30","11:00","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30"];
    if (diaSemana === 6) return ["08:00","08:30","09:00","09:30","10:00","10:30","11:00","11:30","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30"];
    return ["08:30","09:00","09:30","10:00","10:30","11:00","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00"];
  }

  async function carregarHorariosDisponiveis(dataSeleccionada) {
    var selectHora = document.getElementById("hora");
    var barbeiro = document.getElementById("barbeiro").value;
    var servico = document.getElementById("servico").value;

    selectHora.innerHTML = "<option value=''>Carregando horários...</option>";

    var partes = dataSeleccionada.split("-");
    var dateObj = new Date(partes[0], partes[1] - 1, partes[2]);
    var diaSemana = dateObj.getDay();

    if (diaSemana === 0) {
      selectHora.innerHTML = "<option value=''>Fechado aos Domingos</option>";
      return;
    }

    var horariosBase = obtenerMatrizHorarios(diaSemana);
    var ocupados = [];

    try {
      var respuesta = await fetch(API_URL + "?data=" + dataSeleccionada + "&barbero=" + encodeURIComponent(barbeiro));
      ocupados = await respuesta.json(); 
    } catch (e) { console.log(e); }

    var bloquesOcupados = [];
    ocupados.forEach(function(item) {
      var hItem = (typeof item === 'object') ? item.hora : item;
      var blq = (typeof item === 'object') ? parseInt(item.bloques) : 1;
      var t = hItem.toString().trim().substring(0, 5);
      var idx = horariosBase.indexOf(t);
      if (idx !== -1) {
        for (var b = 0; b < blq; b++) {
          if ((idx + b) < horariosBase.length) bloquesOcupados.push(horariosBase[idx + b]);
        }
      }
    });

    var agora = new Date();
    var hoyStr = agora.getFullYear() + "-" + String(agora.getMonth() + 1).padStart(2, '0') + "-" + String(agora.getDate()).padStart(2, '0');
    var horaActualStr = String(agora.getHours()).padStart(2, '0') + ":" + String(agora.getMinutes()).padStart(2, '0');

    selectHora.innerHTML = "";

    for (var i = 0; i < horariosBase.length; i++) {
      var h = horariosBase[i];
      var pasoHora = (dataSeleccionada === hoyStr && h <= horaActualStr);
      var estaOcupado = bloquesOcupados.includes(h);
      var esIndisponivel = false;

      // Excepciones de Última Hora
      var esUltimaHoraManana = (diaSemana === 6 && h === "11:30") || (diaSemana !== 6 && h === "11:00");
      var esUltimaHoraTarde = ((diaSemana === 1 || diaSemana === 6) && h === "17:30") || (diaSemana > 1 && diaSemana < 6 && h === "18:00");

      var bloquesNecesarios = (servico === "Corte e Barba" && !esUltimaHoraManana && !esUltimaHoraTarde) ? 2 : 1;

      for (var b = 0; b < bloquesNecesarios; b++) {
        if ((i + b) >= horariosBase.length) { esIndisponivel = true; break; }
        if (bloquesOcupados.includes(horariosBase[i + b])) {
          if (b === 0) estaOcupado = true; else esIndisponivel = true;
          break;
        }
      }

      var opt = document.createElement("option");
      opt.value = h; opt.text = h;

      if (pasoHora) { opt.disabled = true; opt.text = h + " (Já passou)"; }
      else if (estaOcupado) { opt.disabled = true; opt.text = h + " (Ocupado)"; }
      else if (esIndisponivel) { opt.disabled = true; opt.text = h + " (Indisponível)"; }

      selectHora.add(opt);
    }

    var optSeleccione = document.createElement("option");
    optSeleccione.text = "Selecione o seu horário..."; optSeleccione.disabled = true; optSeleccione.selected = true;
    selectHora.insertBefore(optSeleccione, selectHora.firstChild);
  }

  window.solicitarAgendamento = function() {
    var btn = document.getElementById("btnAgendar");
    var data = document.getElementById("data").value;
    var hora = document.getElementById("hora").value;
    var nome = document.getElementById("nome").value.trim();
    var telefone = document.getElementById("telefone").value.trim();
    var barbeiro = document.getElementById("barbeiro").value;
    var servico = document.getElementById("servico").value;

    if (!data || !hora || hora === "" || hora.includes("Selecione") || !nome || !telefone) {
      alert("Por favor, selecione um horário válido."); return;
    }

    var textoWhatsApp = "Olá " + barbeiro + "!%0A%0A" + "Confirmar agendamento no David Barber Studio:%0A" + "✂️ Serviço: " + servico + "%0A" + "📅 Data: " + data + "%0A" + "⏰ Hora: " + hora + "%0A" + "👤 Nome: " + nome;
    window.open("https://wa.me/5595991554792?text=" + textoWhatsApp, "_blank");

    btn.disabled = true; document.getElementById("confirmacao").style.display = "block";

    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({ data: data, hora: hora, cliente: nome, telefone: telefone, servico: servico, barbeiro: barbeiro })
    }).then(() => {
      document.getElementById("nome").value = ""; document.getElementById("telefone").value = "";
      triggerCargaHoras(); document.getElementById("confirmacao").style.display = "none"; btn.disabled = false;
    }).catch(() => { btn.disabled = false; });
  };
})();
</script>
</body>
</html>
